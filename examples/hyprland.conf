# Example Hyprland config for clipmenu

# Autostart clipboard daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Keybinds
# Super+Ctrl+V → toggle clipboard picker
bind = SUPER+Ctrl, V, exec, clipmenu

# Quick paste top entry (recent)
bindl = CTRL SHIFT ALT, V, exec, sleep 0.5 && wtype -M ctrl v -m ctrl

windowrule = float true, match:class fuzzel, match:title Clipboard
windowrule = center 1, match:class fuzzel, match:title Clipboard
